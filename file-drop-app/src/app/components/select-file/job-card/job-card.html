<div class="file-card">
    <div class="thumbnail">
      @if (job.status !== JobStatus.PROCESSED) {
        <button class="select-btn" (click)="processJob.emit(job.jobId)">Process</button>
      } @else {
        <button class="open-btn" (click)="openImages.emit(job.jobId)">Open</button>
    }
      </div>
    <div class="file-info">
        <p class="job-id">{{ job.fileNameWithExtension }}</p>
        <p>{{ job.date }}</p>
        <p>{{ job.jobId }}</p>
        <p>{{ job.status }}</p>
    </div>
</div>
